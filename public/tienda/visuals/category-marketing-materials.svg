<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Menus and marketing print">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0a08"/>
      <stop offset="1" stop-color="#1a1610"/>
    </linearGradient>
    <linearGradient id="menu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c1810"/>
      <stop offset="1" stop-color="#1a0f0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Folded menu booklet -->
  <g transform="translate(200 120)">
    <rect width="320" height="560" rx="8" fill="url(#menu)" stroke="#c9a84a" stroke-width="2"/>
    <rect x="24" y="48" width="200" height="10" rx="2" fill="#e8d5a3" opacity="0.7"/>
    <line x1="24" y1="120" x2="296" y2="120" stroke="rgba(232,213,163,0.2)" stroke-width="1"/>
    <line x1="24" y1="160" x2="260" y2="160" stroke="rgba(232,213,163,0.12)" stroke-width="1"/>
    <line x1="24" y1="184" x2="240" y2="184" stroke="rgba(232,213,163,0.12)" stroke-width="1"/>
    <text x="160" y="96" text-anchor="middle" fill="rgba(232,213,163,0.55)" font-family="Georgia,serif" font-size="18">MENU</text>
  </g>
  <!-- Postcard / mailer -->
  <g transform="translate(560 200)">
    <rect width="400" height="280" rx="10" fill="#fffef9" stroke="rgba(44,38,28,0.12)" stroke-width="1"/>
    <rect x="32" y="40" width="200" height="12" rx="3" fill="#c9a84a" opacity="0.65"/>
    <rect x="32" y="72" width="300" height="8" rx="2" fill="#2c261c" opacity="0.15"/>
    <rect x="32" y="120" width="336" height="120" rx="4" fill="#f0ebe3"/>
  </g>
</svg>
