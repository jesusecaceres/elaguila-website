<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Front and back business cards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1c1814"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8d5a3"/>
      <stop offset="1" stop-color="#6b5410"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Back card (slightly behind) -->
  <g transform="translate(380 200) rotate(-4)">
    <rect width="400" height="250" rx="14" fill="#1a1814" stroke="rgba(201,168,74,0.35)" stroke-width="2"/>
    <rect x="40" y="100" width="200" height="10" rx="2" fill="#c9a84a" opacity="0.7"/>
    <text x="200" y="200" text-anchor="middle" fill="rgba(255,247,226,0.35)" font-size="18" font-family="Georgia,serif">Back</text>
  </g>
  <!-- Front card -->
  <g transform="translate(480 240) rotate(2)">
    <rect width="400" height="250" rx="14" fill="#fffef9" stroke="url(#gold)" stroke-width="2.5" filter="drop-shadow(0 20px 40px rgba(0,0,0,0.4))"/>
    <rect x="40" y="48" width="160" height="12" rx="3" fill="url(#gold)" opacity="0.9"/>
    <rect x="40" y="80" width="260" height="9" rx="2" fill="#2c261c" opacity="0.35"/>
    <text x="200" y="200" text-anchor="middle" fill="rgba(44,38,28,0.35)" font-size="18" font-family="Georgia,serif">Front</text>
  </g>
</svg>
