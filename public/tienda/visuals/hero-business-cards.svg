<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Premium business cards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#1c1814"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0e4c8"/>
      <stop offset="1" stop-color="#8a7018"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <g transform="translate(180 80)">
    <rect x="48" y="120" width="420" height="260" rx="14" fill="#fffef9" stroke="url(#gold)" stroke-width="2.5" filter="drop-shadow(0 20px 40px rgba(0,0,0,0.5))"/>
    <rect x="80" y="160" width="200" height="12" rx="3" fill="url(#gold)" opacity="0.9"/>
    <rect x="80" y="196" width="280" height="9" rx="2" fill="#2c261c" opacity="0.35"/>
    <rect x="80" y="220" width="200" height="7" rx="2" fill="#2c261c" opacity="0.22"/>
    <rect x="80" y="280" width="140" height="8" rx="2" fill="#c9a84a" opacity="0.6"/>
  </g>
</svg>
