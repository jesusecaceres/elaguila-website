<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="One-sided business card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1c1814"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0e4c8"/>
      <stop offset="1" stop-color="#8a7018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="380" y="220" width="440" height="280" rx="16" fill="#fffef9" stroke="url(#gold)" stroke-width="2.5" filter="drop-shadow(0 24px 48px rgba(0,0,0,0.45))"/>
  <rect x="430" y="280" width="180" height="14" rx="4" fill="url(#gold)" opacity="0.9"/>
  <rect x="430" y="320" width="300" height="10" rx="2" fill="#2c261c" opacity="0.35"/>
  <rect x="430" y="340" width="220" height="8" rx="2" fill="#2c261c" opacity="0.2"/>
  <text x="600" y="580" text-anchor="middle" fill="rgba(255,247,226,0.4)" font-size="20" font-family="Georgia,serif">One side</text>
</svg>
