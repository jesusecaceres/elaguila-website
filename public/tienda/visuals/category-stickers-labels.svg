<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Sticker sheet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#14121a"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece8e0"/>
      <stop offset="1" stop-color="#d8d0c4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="300" y="140" width="600" height="520" rx="12" fill="url(#sheet)" stroke="rgba(44,38,28,0.15)" stroke-width="1"/>
  <!-- Sticker shapes on sheet -->
  <circle cx="460" cy="300" r="72" fill="#fffef9" stroke="#c9a84a" stroke-width="3"/>
  <rect x="580" y="240" width="160" height="100" rx="14" fill="#fffef9" stroke="#8a7018" stroke-width="2.5"/>
  <circle cx="720" cy="460" r="56" fill="none" stroke="#c9a84a" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="380" y="420" width="200" height="120" rx="20" fill="#1a1814" stroke="#e8d5a3" stroke-width="2"/>
  <rect x="640" y="400" width="140" height="140" rx="10" fill="#2c261c" opacity="0.85" stroke="rgba(201,168,74,0.4)"/>
  <text x="600" y="700" text-anchor="middle" fill="rgba(255,247,226,0.35)" font-size="18" font-family="system-ui,sans-serif">Stickers &amp; labels</text>
</svg>
