<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Business cards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1c1814"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="1" stop-color="#e8e0d4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8d5a3"/>
      <stop offset="1" stop-color="#9a7b28"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Stack reads clearly as 3.5x2 business cards -->
  <g filter="url(#sh)" transform="translate(520 200)">
    <rect x="0" y="80" width="360" height="220" rx="10" fill="url(#g)" stroke="rgba(44,38,28,0.15)" stroke-width="1"/>
    <rect x="-24" y="40" width="360" height="220" rx="10" fill="#f5f0e6" stroke="rgba(44,38,28,0.12)" stroke-width="1"/>
    <rect x="-48" y="0" width="360" height="220" rx="10" fill="#fffef9" stroke="url(#gold)" stroke-width="2"/>
    <rect x="-32" y="28" width="304" height="8" rx="2" fill="url(#gold)" opacity="0.85"/>
    <rect x="-32" y="52" width="200" height="6" rx="2" fill="#2c261c" opacity="0.35"/>
    <rect x="-32" y="68" width="160" height="5" rx="1" fill="#2c261c" opacity="0.22"/>
  </g>
</svg>
